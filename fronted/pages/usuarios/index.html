<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Usuarios — AcademiX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/fronted/css/style.css">
  <style>
    .user-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-100)}
    .user-row:last-child{border-bottom:none}
    .user-info{flex:1}
    .user-info strong{display:block;font-size:13.5px;color:var(--gray-800)}
    .user-info span{font-size:12px;color:var(--gray-400)}
    .user-actions{display:flex;align-items:center;gap:8px}
  </style>
</head>
<body>
<header class="topbar">
  <a href="../dashboard/" class="topbar-brand"><div class="topbar-logo">A</div><div class="topbar-brand-text"><strong>AcademiX</strong><span>Gestión de Extensión</span></div></a>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <button class="topbar-btn"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg><span class="notif-dot"></span></button>
    <button class="topbar-btn"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></button>
  </div>
</header>
<nav class="sidebar">
  <a class="sidebar-item" data-page="dashboard" href="../dashboard/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>Dashboard</a>
  <a class="sidebar-item" data-page="actividades" href="../actividades/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Actividades</a>
  <a class="sidebar-item" data-page="nueva-actividad" href="../nueva-actividad/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 4v16m8-8H4"/></svg>Nueva Actividad</a>
  <a class="sidebar-item" data-page="busqueda-avanzada" href="../busqueda-avanzada/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>Búsqueda Avanzada</a>
  <div class="sidebar-divider"></div>
  <a class="sidebar-item" data-page="reportes" href="../reportes/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Reportes</a>
  <a class="sidebar-item" data-page="generador-ia" href="../generador-ia/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>Generador IA</a>
  <div class="sidebar-divider"></div>
  <a class="sidebar-item" data-page="historial" href="../historial/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Historial</a>
  <a class="sidebar-item active" data-page="usuarios" href="../usuarios/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Usuarios</a>
  <a class="sidebar-item" data-page="configuracion" href="../configuracion/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3" stroke-width="1.8"/></svg>Configuración</a>
</nav>
<main class="main">
  <div class="page-header-row">
    <div class="page-header"><h1>Gestión de Usuarios</h1><p>Administra los usuarios del sistema</p></div>
    <button class="btn btn-primary" id="btn-nuevo">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      Nuevo Usuario
    </button>
  </div>
  <div class="metric-grid" style="max-width:600px;margin-bottom:20px">
    <div class="metric-card"><div class="metric-card-header"><span class="metric-card-label">Total Usuarios</span></div><div class="metric-card-value" id="m-total" style="color:var(--brand-primary)">0</div></div>
    <div class="metric-card"><div class="metric-card-header"><span class="metric-card-label">Administradores</span></div><div class="metric-card-value" id="m-admins" style="color:var(--brand-primary)">0</div></div>
    <div class="metric-card"><div class="metric-card-header"><span class="metric-card-label">Docentes</span></div><div class="metric-card-value" id="m-docentes" style="color:var(--color-success)">0</div></div>
  </div>
  <div class="card" style="max-width:740px">
    <div class="card-title"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Lista de Usuarios</div>
    <div id="usuarios-lista">
      <div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg><p>No hay más usuarios registrados</p></div>
    </div>
  </div>
</main>
<script type="module">
  import { usuariosAPI } from '../../js/api.js';
  import { getInitials, avatarColor, showToast } from '../../js/utils.js';
  const ROL = {
    admin:   { bg:'var(--brand-primary-soft)', color:'var(--brand-primary)', label:'Admin' },
    docente: { bg:'var(--color-success-soft)',  color:'var(--color-success)',  label:'Docente' },
  };
  async function load() {
    try {
      const d = await usuariosAPI.getAll();
      const us = d.usuarios || [];
      document.getElementById('m-total').textContent   = us.length;
      document.getElementById('m-admins').textContent  = us.filter(u=>u.rol==='admin').length;
      document.getElementById('m-docentes').textContent= us.filter(u=>u.rol==='docente').length;
      if (!us.length) return;
      document.getElementById('usuarios-lista').innerHTML = us.map(u => {
        const r = ROL[u.rol] || ROL.docente;
        return `<div class="user-row">
          <div class="avatar" style="background:${avatarColor(u.nombre)}">${getInitials(u.nombre)}</div>
          <div class="user-info"><strong>${u.nombre}</strong><span>✉ ${u.correo}</span></div>
          <div class="user-actions">
            <span class="badge" style="background:${r.bg};color:${r.color}">${r.label}</span>
            <button class="btn btn-ghost btn-sm" onclick="editarUsuario(${u.id})">Editar</button>
          </div>
        </div>`;
      }).join('');
    } catch {}
  }
  window.editarUsuario = id => showToast('Editar usuario #' + id, 'info');
  document.getElementById('btn-nuevo').addEventListener('click', () => showToast('Módulo en construcción', 'info'));
  load();
</script>
<script src="../../js/sidebar.js"></script>
</body>
</html>
