<!-- Contenido -->
<main class="main">
  <div class="page-header">
    <h1>Registrar Nueva Actividad</h1>
    <p>Complete el formulario con los datos de la actividad de extensión</p>
  </div>

  <div class="form-section">
    <div class="form-section-title">Información General</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Mes</label>
        <select class="form-control" id="mes">
          <option value="">Seleccionar mes</option>
          <option>Enero</option><option>Febrero</option><option>Marzo</option>
          <option>Abril</option><option>Mayo</option><option>Junio</option>
          <option>Julio</option><option>Agosto</option><option>Septiembre</option>
          <option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Periodo</label>
        <select class="form-control" id="periodo">
          <option value="">Seleccionar periodo</option>
          <option>2024-1</option><option>2024-2</option>
          <option>2025-1</option><option>2025-2</option>
          <option>2026-1</option><option>2026-2</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Fecha de Inicio</label>
        <input type="date" class="form-control" id="fecha_inicio">
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de Fin</label>
        <input type="date" class="form-control" id="fecha_fin">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tipología</label>
        <select class="form-control" id="tipologia">
          <option value="">Seleccionar tipología</option>
          <option>Taller</option><option>Seminario</option><option>Conferencia</option>
          <option>Curso</option><option>Proyecto</option><option>Práctica</option>
          <option>Asesoría</option><option>Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Modalidad</label>
        <select class="form-control" id="modalidad">
          <option value="">Seleccionar modalidad</option>
          <option>Presencial</option><option>Virtual</option><option>Híbrida</option>
        </select>
      </div>
    </div>

<div class="form-group">
  <label class="form-label">Programa</label>
  <select class="form-control" id="programa">
    <option value="">Seleccionar programa</option>

    <optgroup label="FACI — Facultad de Ciencias de la Ingeniería">
      <option>Ingeniería de Sistemas</option>
      <option>Tecnología en Electrónica y Telecomunicaciones</option>
      <option>Tecnología en Electricidad Industrial</option>
      <option>Tecnología en Sistemas</option>
      <option>Tecnología en Control de Procesos Industriales</option>
      <option>Tecnología en Construcción de Obras Civiles</option>
      <option>Tecnología en Sistemas de Información</option>
      <option>Técnica Profesional en Instrumentación Industrial</option>
      <option>Técnica Profesional en Mantenimiento de Computadores y Redes</option>
    </optgroup>

    <optgroup label="FACE — Facultad de Ciencias Económicas">
      <option>Administración de Empresas</option>
      <option>Administración de Negocios Internacionales</option>
      <option>Contaduría Pública</option>
      <option>Administración en Seguridad y Salud en el Trabajo</option>
      <option>Tecnología en Contabilidad Sistematizada</option>
      <option>Tecnología en Gestión Naviera y Portuaria</option>
      <option>Tecnología en Gestión Logística y Portuaria</option>
      <option>Tecnología en Gestión Financiera</option>
      <option>Tecnología en Gestión del Talento Humano</option>
      <option>Tecnología en Seguridad y Salud en el Trabajo</option>
    </optgroup>

    <optgroup label="FACSO — Facultad de Ciencias Sociales">
      <option>Derecho</option>
      <option>Comunicación Social</option>
      <option>Tecnología en Criminalística y Gestión Judicial</option>
    </optgroup>

    <option value="Otro">Otro</option>
  </select>
</div>

    <div class="form-group">
      <label class="form-label">Nombre de la Actividad</label>
      <input type="text" class="form-control" id="nombre" placeholder="Ej: Taller de robótica con Arduino">
    </div>

    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-control" id="descripcion" rows="3" placeholder="Describe la actividad..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Objetivo</label>
      <textarea class="form-control" id="objetivo" rows="3" placeholder="¿Qué se busca lograr?"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Número de Participantes</label>
        <input type="number" class="form-control" id="num_participantes" value="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Horas Dedicadas</label>
        <input type="number" class="form-control" id="horas_dedicadas" value="0" min="0">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Recursos Utilizados</label>
      <textarea class="form-control" id="recursos" rows="3" placeholder="Equipos, materiales, espacios..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Resultados</label>
      <textarea class="form-control" id="resultados" rows="3" placeholder="Logros obtenidos..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Observaciones</label>
      <textarea class="form-control" id="observaciones" rows="3" placeholder="Notas adicionales..."></textarea>
    </div>

    <div class="form-actions">
      <a href="../actividades/" class="btn btn-secondary">Cancelar</a>
      <button class="btn btn-primary" id="btn-guardar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
        Guardar Actividad
      </button>
    </div>
  </div>
</main>

<script type="module">
  import { actividadesAPI } from '../../js/api.js';
  import { showToast } from '../../js/utils.js';

  document.getElementById('btn-guardar').addEventListener('click', async () => {
    const nombre = document.getElementById('nombre').value.trim();
    if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

    const payload = {
      mes:              document.getElementById('mes').value,
      periodo:          document.getElementById('periodo').value,
      fecha_inicio:     document.getElementById('fecha_inicio').value,
      fecha_fin:        document.getElementById('fecha_fin').value,
      tipologia:        document.getElementById('tipologia').value,
      modalidad:        document.getElementById('modalidad').value,
      programa:         document.getElementById('programa').value,
      nombre,
      descripcion:      document.getElementById('descripcion').value,
      objetivo:         document.getElementById('objetivo').value,
      num_participantes: parseInt(document.getElementById('num_participantes').value) || 0,
      horas_dedicadas:  parseInt(document.getElementById('horas_dedicadas').value) || 0,
      recursos:         document.getElementById('recursos').value,
      resultados:       document.getElementById('resultados').value,
      observaciones:    document.getElementById('observaciones').value,
    };

    try {
      await actividadesAPI.create(payload);
      showToast('Actividad guardada exitosamente');
      setTimeout(() => window.location.href = '../actividades/', 1500);
    } catch {
      showToast('Error al guardar. Verifica el backend.', 'error');
    }
  });
</script>
<script src="/fronted/js/sidebar.js"></script>
</body>
</html>
