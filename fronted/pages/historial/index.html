<main class="main">
  <div class="page-header"><h1>Historial de Cambios</h1><p>Registro de todas las modificaciones realizadas</p></div>
  <div class="card" style="max-width:740px">
    <div class="card-title"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Actividad Reciente</div>
    <div id="historial-lista">
      <div class="empty-state">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p>No hay cambios recientes</p>
      </div>
    </div>
  </div>
</main>
<script type="module">
  import { historialAPI } from '/fronted/js/api.js';
  import { timeAgo } from '/fronted/js/utils.js';

  const TIPO_CONFIG = {
    creacion: { color:'#d1fae5', icon_color:'#10b981', label:'Creación', badge_bg:'#d1fae5', badge_color:'#065f46' },
    edicion:  { color:'#e0f2fe', icon_color:'#0ea5e9', label:'Edición',  badge_bg:'#e0f2fe', badge_color:'#0369a1' },
    eliminacion:{ color:'#fee2e2',icon_color:'#ef4444',label:'Eliminación',badge_bg:'#fee2e2',badge_color:'#991b1b' },
  };

  async function load() {
    try {
      const d = await historialAPI.getAll();
      const lista = d.historial || [];
      if (!lista.length) return;
      document.getElementById('historial-lista').innerHTML = lista.map(h => {
        const cfg = TIPO_CONFIG[h.tipo] || TIPO_CONFIG.edicion;
        return `<div class="history-item">
          <div class="history-icon" style="background:${cfg.color}">
            <svg fill="none" stroke="${cfg.icon_color}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <div class="history-body">
            <strong>${h.titulo}</strong>
            <p>${h.descripcion}</p>
            <div class="history-meta">
              <span><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>${h.usuario}</span>
              <span><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${timeAgo(h.fecha)}</span>
            </div>
          </div>
          <span class="history-badge" style="background:${cfg.badge_bg};color:${cfg.badge_color}">${cfg.label}</span>
        </div>`;
      }).join('');
    } catch {}
  }
  load();
</script>
